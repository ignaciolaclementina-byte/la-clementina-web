<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clementina IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0e1117; /* El oscuro original de Streamlit */
            color: white;
            font-family: sans-serif;
        }
        .reporte-box {
            background-color: white !important;
            padding: 25px;
            border-radius: 15px;
            color: black !important;
            border-left: 12px solid #2E7D32;
            margin-top: 20px;
        }
        .btn-whatsapp {
            display: block;
            background-color: #25D366;
            color: white !important;
            padding: 15px;
            border-radius: 30px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <h1 style="text-align: center; font-size: 32px; font-weight: bold;">🚜 LA CLEMENTINA IA</h1>
        <p style="text-align: center;">San Jorge, Santa Fe</p>

        <!-- Sección de carga simulada -->
        <div class="mt-8 p-6 border-2 border-dashed border-gray-600 rounded-lg text-center">
             <p>CARGÁ TU IMAGEN PARA EL DIAGNÓSTICO</p>
             <input type="file" class="mt-4">
        </div>

        <!-- Botón que genera la acción -->
        <button onclick="generar()" class="w-full bg-green-700 h-12 rounded-full font-bold mt-6">🚀 GENERAR DIAGNÓSTICO</button>

        <div id="resultado" class="hidden">
            <div class="reporte-box">
                <div id="texto-informe"></div>
            </div>
            <a id="link-wa" href="#" target="_blank" class="btn-whatsapp">📲 ENVIAR POR WHATSAPP</a>
        </div>

        <footer class="mt-20 text-center border-t border-gray-800 pt-6">
            Desarrollado por <b>IGNACIO DIAZ</b>
        </footer>
    </div>

    <script>
        function generar() {
            const informe = "DIAGNÓSTICO: Se observa necesidad de tratamiento.\nRECETA: Usar productos del Vademécum Clementina.\n\n📌 Recordá que todos los productos se compran en LA CLEMENTINA - SAN JORGE.";
            document.getElementById('texto-informe').innerText = informe;
            document.getElementById('resultado').classList.remove('hidden');
            
            const msg = encodeURIComponent("🚜 *INFORME TÉCNICO LA CLEMENTINA*\n\n" + informe);
            document.getElementById('link-wa').href = "https://wa.me/543406649346?text=" + msg;
        }
    </script>
</body>
</html>
