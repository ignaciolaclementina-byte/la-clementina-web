<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clementina IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0e1117;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            background: #1a1c23;
            border: 1px solid #30363d;
            border-radius: 12px;
        }
        .resultado-blanco {
            background-color: #ffffff;
            color: #1a1a1a;
            border-left: 8px solid #238636;
        }
        .btn-principal {
            background-color: #238636;
            transition: transform 0.2s;
        }
        .btn-principal:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4">
    <main class="flex-grow max-w-lg mx-auto w-full pt-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-white">🚜 LA CLEMENTINA IA</h1>
            <p class="text-gray-400 mt-1">San Jorge, Santa Fe</p>
        </div>

        <div class="card p-6 shadow-xl">
            <label class="block text-sm font-medium text-gray-300 mb-4 text-center">
                Subí la foto del lote o maleza para analizar
            </label>
            
            <input type="file" id="foto" class="block w-full text-sm text-gray-400
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-gray-700 file:text-gray-200
                hover:file:bg-gray-600 mb-6">

            <button onclick="analizar()" id="btn-accion" class="btn-principal w-full py-4 rounded-xl font-bold text-lg">
                🚀 GENERAR DIAGNÓSTICO
            </button>
        </div>

        <div id="seccion-resultado" class="hidden mt-6 animate-pulse">
            <div class="resultado-blanco p-5 rounded-xl shadow-2xl">
                <h3 class="font-bold text-green-800 mb-2">INFORME TÉCNICO</h3>
                <p id="texto-informe" class="text-sm leading-relaxed"></p>
            </div>

            <a id="wa-link" href="#" target="_blank" class="flex items-center justify-center w-full bg-[#25D366] text-white font-bold py-4 rounded-xl mt-4 shadow-lg">
                <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.48 5.228 3.48 8.404c0 6.556-5.332 11.888-11.888 11.888-2.01 0-3.988-.511-5.741-1.483l-6.142 1.613zm6.275-3.328l.351.208c1.554.919 3.344 1.403 5.176 1.403 5.452 0 9.888-4.436 9.888-9.888 0-2.639-1.027-5.119-2.892-6.984s-4.345-2.892-6.984-2.892c-5.452 0-9.888 4.436-9.888 9.888 0 1.956.577 3.864 1.668 5.485l.228.341-1.011 3.693 3.784-.994z"/></svg>
                ENVIAR AL PRODUCTOR
            </a>
        </div>
    </main>

    <footer class="text-center py-8 text-gray-500 text-xs">
        Desarrollado por <span class="font-bold text-gray-400 text-sm italic">IGNACIO DIAZ</span>
    </footer>

    <script>
        function analizar() {
            const btn = document.getElementById('btn-accion');
            btn.innerText = "⏳ ANALIZANDO MUESTRA...";
            btn.disabled = true;

            setTimeout(() => {
                const info = "DIAGNÓSTICO: Maleza detectada en estadio V3. Se recomienda aplicación inmediata.\n\nRECETA SUGERIDA: Mezcla de Herbicidas + Adherente Optimizer.\n\n📍 Insumos disponibles en sucursal San Jorge.";
                
                document.getElementById('texto-informe').innerText = info;
                document.getElementById('seccion-resultado').classList.remove('hidden');
                document.getElementById('seccion-resultado').classList.remove('animate-pulse');
                
                const waMsg = encodeURIComponent("🚜 *LA CLEMENTINA IA*\n\n" + info);
                document.getElementById('wa-link').href = "https://wa.me/543406649346?text=" + waMsg;
                
                btn.innerText = "✅ ANÁLISIS COMPLETADO";
            }, 2000);
        }
    </script>
</body>
</html>
